name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: mvn verify (JDK 21, Postgres via Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Docker is available
        run: docker version

      - name: Run mvn verify
        env:
          # Testcontainers performance: reuse container across test classes if supported.
          TESTCONTAINERS_REUSE_ENABLE: 'true'
          # Required by JwtProperties validation at boot. CI-only - never used in prod.
          JWT_SECRET: 'ci-only-jwt-secret-must-be-at-least-32-characters-long-padding'
        run: mvn -B -ntp verify

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 14
