name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend - mvn verify (JDK 21, Postgres via Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Docker is available
        run: docker version

      - name: Run mvn verify
        env:
          TESTCONTAINERS_REUSE_ENABLE: 'true'
          JWT_SECRET: 'ci-only-jwt-secret-must-be-at-least-32-characters-long-padding'
        run: mvn -B -ntp verify

      - name: Upload JaCoCo HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload backend test reports on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: backend-test-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 14

  frontend:
    name: frontend - build, lint, jest (Node 20, Angular 17)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Unit tests (Jest)
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload built bundle on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
