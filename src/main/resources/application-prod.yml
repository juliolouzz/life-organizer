# Production overlay over application.yml. Activate with SPRING_PROFILES_ACTIVE=prod.
# Backed up by .env.prod.example - keep them aligned when you change defaults.

spring:
  main:
    banner-mode: off
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    properties:
      hibernate:
        format_sql: false

# Hide error internals from clients in production responses.
server:
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false

app:
  mail:
    provider: smtp
  auth:
    dev-delivery:
      # Disabled in prod regardless of any inherited default. Tokens never
      # touch the filesystem when SMTP is the delivery channel.
      enabled: false
    # Prod implies "shared with other users" - turn the verify-your-email
    # gate back on by default. Override with APP_AUTH_EMAIL_VERIFICATION_ENABLED=false
    # if you self-host prod for yourself only.
    email-verification:
      enabled: ${APP_AUTH_EMAIL_VERIFICATION_ENABLED:true}

# JSON log output. logback-spring.xml switches the appender when this profile is active.
logging:
  config: classpath:logback-spring.xml
