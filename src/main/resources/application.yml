spring:
  application:
    name: life-organizer
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/life_organizer}
    username: ${DB_USERNAME:life_organizer}
    password: ${DB_PASSWORD:life_organizer}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET}
    access-ttl: 15m
    refresh-ttl: 7d
    clock-skew: 30s
  pagination:
    default-limit: 20
    max-limit: 100
  auth:
    # Off by default - tokens never leave memory in this configuration. Self-hosted
    # operators without SMTP can opt in (see AuthDevDeliveryProperties) to have
    # reset / verify links appended to a local file.
    dev-delivery:
      enabled: ${APP_AUTH_DEV_DELIVERY_ENABLED:false}
      file-path: ${APP_AUTH_DEV_DELIVERY_FILE:.tmp/auth-dev-links.txt}
    # Off by default - single-operator self-host does not need the "verify your
    # email" friction step. New users are auto-marked verified at register; no
    # verification email is sent. Flip to true when sharing the app with others
    # to restore the gate. Other email flows (password reset, change-email,
    # account restore) are unaffected by this flag.
    email-verification:
      enabled: ${APP_AUTH_EMAIL_VERIFICATION_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized
  health:
    db:
      enabled: true
    # Mail health probe is noisy when SMTP is unconfigured (the default for
    # personal-use deployments) - it logs a full stack trace on every
    # /actuator/health hit. Disable it; real SMTP failures still show up in
    # the application logs when an actual outbound mail is attempted.
    mail:
      enabled: false

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [requestId=%X{requestId:-}] %logger{36} - %msg%n"
  level:
    root: INFO
    com.julio.lifeorganizer: INFO
