spring:
  datasource:
    # Use env vars when set (Docker / CI), fall back to localhost for the
    # native "JDK + IntelliJ + frontend ng serve" workflow. The previous
    # version hardcoded localhost which broke the local profile when set
    # inside the Docker stack (localhost there is the backend container,
    # not postgres).
    url: ${DB_URL:jdbc:postgresql://localhost:5432/life_organizer}
    username: ${DB_USERNAME:life_organizer}
    password: ${DB_PASSWORD:life_organizer}
  jpa:
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  auth:
    # Local dev only: append reset / verify links to a file so the operator can
    # follow them while no SMTP is wired up. NEVER enable this in profiles that
    # ship to a real deployment - the file would hold credentials.
    dev-delivery:
      enabled: ${APP_AUTH_DEV_DELIVERY_ENABLED:true}
      file-path: ${APP_AUTH_DEV_DELIVERY_FILE:.tmp/auth-dev-links.txt}

logging:
  level:
    com.julio.lifeorganizer: DEBUG
    org.hibernate.SQL: DEBUG
