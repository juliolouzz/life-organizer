spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/life_organizer
    username: life_organizer
    password: life_organizer
  jpa:
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: http://localhost:4200
  auth:
    # Local dev only: append reset / verify links to a file so the operator can
    # follow them while no SMTP is wired up. NEVER enable this in profiles that
    # ship to a real deployment - the file would hold credentials.
    dev-delivery:
      enabled: true
      file-path: .tmp/auth-dev-links.txt

logging:
  level:
    com.julio.lifeorganizer: DEBUG
    org.hibernate.SQL: DEBUG
