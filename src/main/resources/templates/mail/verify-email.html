<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <title>Verify your Life Organizer email</title>
</head>
<body style="font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif; background:#f3f4f6; margin:0; padding:24px;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px; margin:0 auto; background:#ffffff; border-radius:12px; padding:32px;">
    <tr>
      <td>
        <h1 style="font-size:20px; margin:0 0 16px 0; color:#111827;">Verify your email</h1>
        <p style="font-size:14px; color:#374151; line-height:1.55; margin:0 0 12px 0;">Welcome, <span th:text="${displayName}">there</span>!</p>
        <p style="font-size:14px; color:#374151; line-height:1.55; margin:0 0 16px 0;">
          Click below to confirm this email address belongs to you. The link expires in <strong>24 hours</strong>.
        </p>
        <p style="margin:24px 0;">
          <a th:href="${link}"
             style="display:inline-block; padding:12px 22px; background:#7c3aed; color:#ffffff !important; text-decoration:none; border-radius:8px; font-weight:600; font-size:14px;">
            Verify email
          </a>
        </p>
        <p style="font-size:12px; color:#6b7280; line-height:1.5; margin:0 0 12px 0;">
          Or paste this URL into your browser:
        </p>
        <p style="font-size:12px; color:#374151; word-break:break-all; margin:0;">
          <a th:href="${link}" th:text="${link}" style="color:#7c3aed;">https://example/verify-email?token=...</a>
        </p>
      </td>
    </tr>
  </table>
  <p style="font-size:11px; color:#9ca3af; text-align:center; margin-top:18px;">Life Organizer</p>
</body>
</html>
