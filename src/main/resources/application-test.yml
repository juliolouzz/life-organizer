spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: WARN
    com.julio.lifeorganizer: INFO
    org.hibernate.SQL: WARN
    org.testcontainers: WARN

app:
  jwt:
    secret: "test-jwt-secret-32-chars-minimum-padding-padding"
    access-ttl: 15m
    refresh-ttl: 7d
    clock-skew: 30s
  # Disabled by default in tests; the rate-limit-specific test re-enables it via
  # @TestPropertySource. Other integration tests would otherwise poison each other
  # since the limiter is a singleton across the test run.
  rate-limit:
    enabled: false
